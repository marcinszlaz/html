<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>z-index</title>
    <meta name="description" content="W jaki sposób działa z-index w CSS? Jak zmienić warstwowe wyświetlanie elementów?">

    <meta name="author" content="Arkadiusz Włodarczyk">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <!--  
        z-index  
          
    -->
    
    
    <div class="kwadracik" 
        style="background-color: green; z-index: 0; top: 0;"> 
    </div>
    <div class="kwadracik" 
        style="background-color: yellow; z-index: 1; top: 20px;"> 
    </div>
    <div class="kwadracik" 
        style="background-color: red; z-index: 2; top: 40px;"> 
    </div>

    
</body>

</html>
