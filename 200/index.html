<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        
        <title>Drag and drop - przeciąganie i upuszczanie elementów- Arkadiusz Włodarczyk</title>        
        
        <link rel="stylesheet" href="style.css">
        <script src="http://code.jquery.com/jquery-1.7.2.min.js"></script>        
        <script src="jquery.ndd.js"></script>  
        <script src="modernizr.js"></script>

        
    </head>
    <body>
        <header>
            <h1>Sklep z video kursami</h1>
        </header>
 <!--       <div id="dropzone"></div>
        
        <img id="imgvideokurspl" src="logo-videokurspl.gif" draggable="true" 
              width="453" height="98"
             >
        -->
        	<!-- icons from  http://www.iconfinder.net/search/?q=iconset:superpack | author site : http://officinadigitale.forumcommunity.net/-->
	<ul id="produkty">	
		<li>
                    <section class="przedmiot" id="video-kurs-csharp" draggable="true">			
			<div class="opis">
				<h2 class="nazwa">Video Kurs C#</h2>
				<div><b>Cena</b>: <span class="cena">57.00</span> zł</div>				
			</div>
                        <img src="video-kursy/csharp.png" alt="Video Kurs C#" />
                    </section>
                </li>      
		<li>
                    <section class="przedmiot" id="video-kurs-java" draggable="true">
			<div class="opis">
				<h2 class="nazwa">Video Kurs Java</h2>
				<div><b>Cena</b>: <span class="cena">49.00</span> zł</div>				
			</div>
                        <img src="video-kursy/java.gif" alt="Video Kurs Java" />
                    </section>
                </li>     
		<li>
                    <section class="przedmiot" id="video-kurs-mysql" draggable="true">
			<div class="opis">
                                <h2 class="nazwa">Video Kurs MySQL</h2>
				<div><b>Cena</b>: <span class="cena">47.00</span> zł</div>				
			</div>
                        <img src="video-kursy/mysql.gif" alt="Video Kurs MySQL" />
                    </section>
                </li>     
		<li>
                    <section class="przedmiot" id="video-kurs-mysqli" draggable="true">
			<div class="opis">
				<h2 class="nazwa">Video Kurs MySQLi</h2>
				<div><b>Cena</b>: <span class="cena">47.00</span> zł</div>				
			</div>
                        <img src="video-kursy/mysqli.gif" alt="Video Kurs MySQLi" />
                    </section>
                </li>    
		<li>
                    <section class="przedmiot" id="video-kurs-xhtml-css" draggable="true">

			<div class="opis">
				<h2 class="nazwa">Video Kurs XHTML CSS</h2>
				<div><b>Cena</b>: <span class="cena">47.05</span> zł</div>				
			</div>
                        <img src="video-kursy/xhtml-css.gif" alt="Video Kurs XHTML i CSS" />
                    </section>
                </li>                    
        </ul>
        <aside id="kontener_koszyka"> 
            <center><h2 id="naglowek_koszyka">Koszyk</h2></center>
            <ul id="koszyk">
            </ul>

            <div class="info_przeniesienie">Przenieś przedmiot tutaj</div>

            <div id='cena'><b>Razem:</b> <span>0.00</span> zł</div>
        </aside>
                
     <script src="script.js"></script>
    </body>
</html>
